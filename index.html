<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
<title>GRE Vocab — GregMat Edition</title>
<meta name="theme-color" content="#0f0e0c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GRE Vocab">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0c;
  --surface: #1a1916;
  --surface2: #242220;
  --border: #2e2c29;
  --border2: #3d3b37;
  --text: #f0ede8;
  --muted: #8a877f;
  --accent: #e8c47a;
  --accent2: #c4a55a;
  --green: #7ac47a;
  --red: #c47a7a;
  --amber: #c4a55a;
  --blue: #7aaac4;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
/* LAYOUT */
.shell { display: flex; min-height: 100vh; }
.sidebar {
  width: 240px;
  min-width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  height: 100vh;
  overflow-y: auto;
  z-index: 10;
}
.main { margin-left: 240px; flex: 1; min-height: 100vh; }

/* SIDEBAR */
.sidebar-logo {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.logo-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--accent);
  line-height: 1.2;
}
.logo-sub { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: 0.05em; text-transform: uppercase; }

.sidebar-nav { padding: 12px 0; }
.nav-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 20px 4px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px; cursor: pointer;
  font-size: 13px; color: var(--muted);
  transition: all 0.15s; border-left: 2px solid transparent;
}
.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(232,196,122,0.06); }
.nav-icon { width: 16px; text-align: center; font-size: 14px; }

.group-list { flex: 1; overflow-y: auto; padding: 0 0 12px; }
.group-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 7px 20px; cursor: pointer;
  font-size: 12px; color: var(--muted); background: none; border: none;
  text-align: left; transition: all 0.15s;
}
.group-btn:hover { color: var(--text); background: var(--surface2); }
.group-btn.active { color: var(--accent); background: rgba(232,196,122,0.06); }
.group-pill {
  font-size: 10px; padding: 1px 6px; border-radius: 10px;
  background: var(--surface2); color: var(--muted);
}
.group-pill.done { background: rgba(122,196,122,0.15); color: var(--green); }

/* MAIN AREA */
.main-header {
  padding: 28px 36px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.page-title { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--text); }
.page-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
.header-stats { display: flex; gap: 20px; }
.hstat { text-align: right; }
.hstat-num { font-size: 20px; font-weight: 600; color: var(--accent); font-family: 'DM Mono', monospace; }
.hstat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

.content { padding: 28px 36px; }

/* MODE TABS */
.mode-tabs { display: flex; gap: 8px; margin-bottom: 28px; }
.mode-tab {
  padding: 8px 20px; border-radius: 6px; cursor: pointer;
  font-size: 13px; font-weight: 500; border: 1px solid var(--border2);
  background: transparent; color: var(--muted); transition: all 0.15s;
}
.mode-tab:hover { color: var(--text); border-color: var(--border2); }
.mode-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

/* OVERVIEW PAGE */
.overview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.group-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; cursor: pointer;
  transition: all 0.2s; position: relative; overflow: hidden;
}
.group-card:hover { border-color: var(--accent2); transform: translateY(-1px); }
.group-card.selected { border-color: var(--accent); background: rgba(232,196,122,0.06); }
.group-num { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 6px; }
.group-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 10px; }
.group-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.group-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }
.group-pct { font-size: 10px; color: var(--muted); margin-top: 5px; }

/* FLASHCARD MODE */
.fc-wrap { max-width: 560px; margin: 0 auto; }
.fc-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.fc-counter { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); }
.fc-progress-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; margin: 0 16px; overflow: hidden; }
.fc-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }

.flashcard {
  border-radius: 16px;
  min-height: 320px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 36px;
  text-align: center;
  cursor: pointer;
  transition: background 0.3s, border-color 0.3s;
  position: relative;
  overflow: hidden;
  border: 1px solid transparent;
}
.flashcard:hover { filter: brightness(1.06); }

.fc-hint { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; }
.fc-word { font-family: 'Playfair Display', serif; font-size: 42px; color: var(--text); margin-bottom: 8px; }
.fc-pos { font-size: 12px; color: var(--muted); font-style: italic; }
.fc-divider { width: 40px; height: 1px; background: var(--border2); margin: 20px auto; }
.fc-def { font-size: 16px; color: var(--text); line-height: 1.6; max-width: 400px; }
.fc-ex { font-size: 13px; color: var(--muted); font-style: italic; margin-top: 12px; line-height: 1.5; max-width: 380px; }

.fc-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
.fc-btn {
  padding: 10px 24px; border-radius: 8px; cursor: pointer;
  font-size: 13px; font-weight: 500; border: 1px solid;
  transition: all 0.15s; font-family: 'DM Sans', sans-serif;
}
.fc-btn-hard { background: rgba(196,122,122,0.1); border-color: rgba(196,122,122,0.4); color: var(--red); }
.fc-btn-hard:hover { background: rgba(196,122,122,0.2); }
.fc-btn-ok { background: rgba(196,165,90,0.1); border-color: rgba(196,165,90,0.4); color: var(--amber); }
.fc-btn-ok:hover { background: rgba(196,165,90,0.2); }
.fc-btn-easy { background: rgba(122,196,122,0.1); border-color: rgba(122,196,122,0.4); color: var(--green); }
.fc-btn-easy:hover { background: rgba(122,196,122,0.2); }

.fc-controls { display: flex; justify-content: center; gap: 12px; margin-top: 16px; }
.ctrl-btn {
  padding: 6px 16px; border-radius: 6px; cursor: pointer;
  font-size: 12px; border: 1px solid var(--border2);
  background: transparent; color: var(--muted);
  transition: all 0.15s; font-family: 'DM Sans', sans-serif;
}
.ctrl-btn:hover { color: var(--text); border-color: var(--border); }

/* QUIZ MODE */
.quiz-wrap { max-width: 600px; margin: 0 auto; }
.quiz-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 36px;
}
.quiz-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 20px; }
.quiz-def { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text); line-height: 1.5; margin-bottom: 28px; }
.quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.quiz-opt {
  padding: 14px 18px; border-radius: 10px;
  border: 1px solid var(--border2); background: var(--surface2);
  cursor: pointer; text-align: left;
  font-size: 14px; font-weight: 500; color: var(--text);
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.quiz-opt:hover:not(:disabled) { border-color: var(--accent2); background: rgba(232,196,122,0.06); }
.quiz-opt.correct { border-color: var(--green); background: rgba(122,196,122,0.1); color: var(--green); }
.quiz-opt.wrong { border-color: var(--red); background: rgba(196,122,122,0.1); color: var(--red); }
.quiz-opt:disabled { cursor: default; }

.quiz-stats { display: flex; gap: 16px; margin-top: 20px; }
.qstat {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px; text-align: center;
}
.qstat-num { font-size: 24px; font-weight: 600; font-family: 'DM Mono', monospace; }
.qstat-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

/* WORD LIST */
.wordlist-wrap { max-width: 700px; }
.wl-search {
  width: 100%; padding: 10px 16px; border-radius: 8px;
  border: 1px solid var(--border2); background: var(--surface);
  color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif;
  margin-bottom: 20px; outline: none;
}
.wl-search:focus { border-color: var(--accent2); }
.wl-search::placeholder { color: var(--muted); }
.wl-item {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.wl-item:hover { background: var(--surface); }
.wl-word { font-weight: 600; font-size: 14px; color: var(--text); }
.wl-pos { font-size: 11px; color: var(--muted); font-style: italic; }
.wl-def { font-size: 13px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
.wl-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  border: 1px solid; white-space: nowrap; margin-top: 2px; flex-shrink: 0; margin-left: 12px;
}
.badge-new { border-color: rgba(122,170,196,0.4); color: var(--blue); background: rgba(122,170,196,0.08); }
.badge-learning { border-color: rgba(196,165,90,0.4); color: var(--amber); background: rgba(196,165,90,0.08); }
.badge-known { border-color: rgba(122,196,122,0.4); color: var(--green); background: rgba(122,196,122,0.08); }

/* NEXT BTN */
.next-btn {
  display: block; width: 100%; margin-top: 16px;
  padding: 12px; border-radius: 8px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--text); cursor: pointer; font-size: 14px;
  font-family: 'DM Sans', sans-serif; transition: all 0.15s;
}
.next-btn:hover { background: var(--surface2); border-color: var(--accent2); }

/* DONE SCREEN */
.done-screen { text-align: center; padding: 60px 20px; }
.done-icon { font-size: 48px; margin-bottom: 16px; }
.done-title { font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 8px; }
.done-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
.done-btn {
  padding: 12px 28px; border-radius: 8px; cursor: pointer;
  background: var(--accent); color: var(--bg);
  border: none; font-size: 14px; font-weight: 600;
  font-family: 'DM Sans', sans-serif; margin: 0 6px;
}

/* CARD STATUS COLOURS */
.fc-status-new      { background: var(--surface);                    border-color: var(--border); }
.fc-status-learning { background: rgba(196,165,90,0.12);             border-color: rgba(196,165,90,0.5); }
.fc-status-known    { background: rgba(122,196,122,0.12);            border-color: rgba(122,196,122,0.5); }

/* FLASH COLOURS */
@keyframes flashHard {
  0%   { background: var(--surface); border-color: var(--border); }
  40%  { background: rgba(196,122,122,0.25); border-color: var(--red); }
  100% { background: rgba(196,122,122,0.1); border-color: var(--red); }
}
@keyframes flashOk {
  0%   { background: var(--surface); border-color: var(--border); }
  40%  { background: rgba(196,165,90,0.25); border-color: var(--amber); }
  100% { background: rgba(196,165,90,0.1); border-color: var(--amber); }
}
@keyframes flashEasy {
  0%   { background: var(--surface); border-color: var(--border); }
  40%  { background: rgba(122,196,122,0.25); border-color: var(--green); }
  100% { background: rgba(122,196,122,0.1); border-color: var(--green); }
}
.fc-flash-hard { animation: flashHard 0.35s ease-out forwards; }
.fc-flash-ok   { animation: flashOk   0.35s ease-out forwards; }
.fc-flash-easy { animation: flashEasy 0.35s ease-out forwards; }

/* SPEAKER BUTTON */
.speak-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid var(--border2); background: transparent;
  color: var(--muted); cursor: pointer; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; margin: 4px auto 0;
}
.speak-btn:hover { color: var(--accent); border-color: var(--accent2); }

/* SAVE BAR */
.sidebar-save {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.save-btn {
  flex: 1; padding: 6px 0; border-radius: 6px; cursor: pointer;
  font-size: 11px; border: 1px solid var(--border2);
  background: transparent; color: var(--muted);
  transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  text-align: center; display: block;
}
.save-btn:hover { color: var(--text); border-color: var(--accent2); }
.save-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  transition: background 0.3s;
}
.save-dot-idle    { background: var(--green); }
.save-dot-saving  { background: var(--amber); }
.save-dot-error   { background: var(--red); }

/* KBD HINTS */
.kbd-hints { font-size: 12px; color: var(--muted); }
.kbd-hint { display: flex; align-items: center; gap: 4px; }
kbd {
  display: inline-block; padding: 2px 6px;
  border: 1px solid var(--border2); border-radius: 4px;
  font-size: 11px; font-family: 'DM Mono', monospace;
  background: var(--surface2); color: var(--muted);
  line-height: 1.4;
}

/* STREAK */
.streak-display { font-size: 12px; color: var(--muted); margin-top: 8px; }
.streak-display span { color: var(--accent); font-weight: 500; }

/* STATS PAGE */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
.big-stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--border-radius-lg); padding: 20px; text-align: center; }
.big-stat-num { font-size: 36px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--accent); }
.big-stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--border-radius-lg); padding: 20px; margin-bottom: 28px; }
.chart-title { font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
.bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 80px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bar { width: 100%; background: var(--accent); border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.3s; opacity: 0.8; }
.bar-lbl { font-size: 9px; color: var(--muted); font-family: 'DM Mono', monospace; }
.weak-list { background: var(--surface); border: 1px solid var(--border); border-radius: var(--border-radius-lg); overflow: hidden; }
.weak-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; border-bottom: 1px solid var(--border); }
.weak-item:last-child { border-bottom: none; }
.weak-word { font-size: 14px; font-weight: 500; color: var(--text); }
.weak-count { font-size: 12px; color: var(--red); font-family: 'DM Mono', monospace; }

/* DIFFICULTY BADGE */
.diff-badge {
  font-size: 10px; padding: 2px 7px; border-radius: 10px;
  border: 1px solid; font-weight: 500; letter-spacing: 0.03em;
}

/* CARD EXTRAS */
.fc-root { font-size: 12px; color: var(--blue); margin-top: 12px; }
.fc-root span { font-weight: 500; }
.fc-antonym { font-size: 12px; color: var(--muted); margin-top: 6px; }
.fc-antonym span { color: var(--accent); font-weight: 500; }
.fc-family { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 12px; }
.family-chip {
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--muted); cursor: default;
}
.fc-mnemonic { margin-top: 14px; }
.mnemonic-btn {
  font-size: 12px; padding: 5px 14px; border-radius: 6px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.mnemonic-btn:hover { color: var(--accent); border-color: var(--accent2); }
.mnemonic-text {
  font-size: 13px; color: var(--accent); line-height: 1.6;
  font-style: italic; max-width: 380px; margin: 0 auto;
}

/* FILL IN BLANK */
.fib-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 32px 28px; margin-bottom: 16px; text-align: center;
}
.fib-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; }
.fib-sentence { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); line-height: 1.6; margin-bottom: 12px; }
.fib-hint { font-size: 13px; color: var(--muted); font-style: italic; }
.fib-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }

/* CONFUSED WORDS */
.confused-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; text-align: center;
}
.confused-word { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text); margin-bottom: 8px; }
.confused-def { font-size: 13px; color: var(--muted); line-height: 1.5; }
.confused-tip {
  background: rgba(232,196,122,0.08); border: 1px solid rgba(232,196,122,0.2);
  border-radius: 10px; padding: 14px 18px; font-size: 14px;
  color: var(--accent); margin-bottom: 16px; line-height: 1.5;
}

/* MILESTONE TOAST */
.milestone-toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--surface); border: 1px solid var(--accent2);
  border-radius: 14px; padding: 16px 24px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 9999; min-width: 240px;
}
.milestone-toast.ms-show { transform: translateX(-50%) translateY(0); }
.ms-emoji { font-size: 32px; }
.ms-title { font-weight: 500; font-size: 15px; color: var(--accent); }
.ms-msg { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* CONFETTI */
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
.confetti-piece {
  position: fixed; top: -20px; z-index: 9998;
  animation: confettiFall linear forwards;
}

/* STUDY PLAN */
.plan-header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.plan-progress-summary { display: flex; gap: 20px; }
.plan-stat { text-align: center; }
.plan-stat-num { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--accent); }
.plan-stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.plan-week { margin-bottom: 28px; }
.plan-week-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; font-weight: 500; }
.plan-day {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 18px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px;
  margin-bottom: 8px; transition: border-color 0.15s;
}
.plan-day.today { border-color: var(--accent2); background: rgba(232,196,122,0.05); }
.plan-day.completed { opacity: 0.55; }
.plan-day.completed .plan-day-word { text-decoration: line-through; }
.plan-checkbox {
  width: 20px; height: 20px; border-radius: 5px; border: 1px solid var(--border2);
  background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 2px;

// STATE
let wordData = {};
let fcQueue = [], fcIdx = 0, fcRevealed = false;
let qCorrect = 0, qWrong = 0, qStreak = 0, qAnswered = false;
let currentGroupIdx = null;
let currentMode = 'flashcard';
let currentPage = 'overview';

function initData() {
  // Load from localStorage if available
  try {
    const saved = localStorage.getItem('gre_vocab_progress');
    if (saved) wordData = JSON.parse(saved);
  } catch(e) {}
  // Fill in any missing keys
  GROUPS.forEach((g, gi) => {
    g.words.forEach((w, wi) => {
      const key = gi + '_' + wi;
      wordData[key] = wordData[key] || 'new';
    });
  });
}

function getStatus(gi, wi) { return wordData[gi+'_'+wi] || 'new'; }
function setStatus(gi, wi, s) {
  wordData[gi+'_'+wi] = s;
  saveProgress();
}

let _saveTimer = null;
function saveProgress() {
  const dot = document.getElementById('save-indicator');
  if (dot) { dot.className = 'save-dot save-dot-saving'; }
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    try {
      localStorage.setItem('gre_vocab_progress', JSON.stringify(wordData));
      if (dot) dot.className = 'save-dot save-dot-idle';
    } catch(e) {
      if (dot) dot.className = 'save-dot save-dot-error';
    }
  }, 400);
}

function exportProgress() {
  const { known, total } = totalStats();
  const payload = { version: 1, savedAt: new Date().toISOString(), known, total, data: wordData };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gre_progress_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function importProgress(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const payload = JSON.parse(e.target.result);
      wordData = payload.data || payload;
      saveProgress();
      updateHeaderStats();
      buildSidebar();
      showOverview();
    } catch(err) {
      alert('Could not read progress file.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function groupProgress(gi) {
  const g = GROUPS[gi];
  let known = 0;
  g.words.forEach((_, wi) => { if (getStatus(gi, wi) === 'known') known++; });
  return { known, total: g.words.length, pct: Math.round(known / g.words.length * 100) };
}

function totalStats() {
  let known = 0, total = 0;
  GROUPS.forEach((g, gi) => {
    g.words.forEach((_, wi) => { total++; if (getStatus(gi, wi) === 'known') known++; });
  });
  return { known, total };
}

// SIDEBAR
function buildSidebar() {
  const list = document.getElementById('group-list');
  list.innerHTML = '';
  GROUPS.forEach((g, gi) => {
    const { known, total, pct } = groupProgress(gi);
    const btn = document.createElement('button');
    btn.className = 'group-btn' + (gi === currentGroupIdx ? ' active' : '');
    btn.onclick = () => selectGroup(gi);
    btn.innerHTML = `<span>${g.name}</span><span class="group-pill${pct === 100 ? ' done' : ''}">${known}/${total}</span>`;
    list.appendChild(btn);
  });
}

function updateNavActive(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navMap = { overview: 'nav-overview', 'all-flashcards': 'nav-all-flashcards', review: 'nav-review', stats: 'nav-stats', plan: 'nav-plan' };
  const el = document.getElementById(navMap[page]);
  if (el) el.classList.add('active');
}

// PAGES
function showPage(page) {
  currentPage = page;
  updateNavActive(page);
  if (page === 'overview') showOverview();
  else if (page === 'all-flashcards') { currentGroupIdx = null; buildSidebar(); showGroupStudy('all'); }
  else if (page === 'review') { currentGroupIdx = null; buildSidebar(); showGroupStudy('weak'); }
  else if (page === 'stats') { currentGroupIdx = null; buildSidebar(); showStats(); }
  else if (page === 'plan') { currentGroupIdx = null; buildSidebar(); showPlan(); }
}

function selectGroup(gi) {
  currentGroupIdx = gi;
  buildSidebar();
  updateNavActive(null);
  showGroupStudy(gi);
}

function showOverview() {
  const { known, total } = totalStats();
  document.getElementById('main-title').textContent = 'All Groups';
  document.getElementById('main-sub').textContent = `${known} of ${total} words mastered`;
  document.getElementById('stat-known').textContent = known;
  document.getElementById('stat-total').textContent = total;

  const html = `
    <div class="overview-grid">
      ${GROUPS.map((g, gi) => {
        const { known, total, pct } = groupProgress(gi);
        return `<div class="group-card${gi === currentGroupIdx ? ' selected' : ''}" onclick="selectGroup(${gi})">
          <div class="group-num">GROUP ${gi+1}</div>
          <div class="group-name">${g.words[0].w}, ${g.words[1].w}…</div>
          <div class="group-bar"><div class="group-bar-fill" style="width:${pct}%"></div></div>
          <div class="group-pct">${known}/${total} known · ${pct}%</div>
        </div>`;
      }).join('')}
    </div>`;
  document.getElementById('main-content').innerHTML = html;
}

function getStudyWords(source) {
  let pairs = [];
  if (source === 'all') {
    GROUPS.forEach((g, gi) => g.words.forEach((w, wi) => pairs.push({gi, wi, w})));
  } else if (source === 'weak') {
    GROUPS.forEach((g, gi) => g.words.forEach((w, wi) => {
      const s = getStatus(gi, wi);
      if (s === 'new' || s === 'learning') pairs.push({gi, wi, w});
    }));
  } else {
    GROUPS[source].words.forEach((w, wi) => pairs.push({gi: source, wi, w}));
  }
  return pairs;
}

function showGroupStudy(source) {
  let label, sub;
  if (source === 'all') { label = 'All Words'; sub = 'Studying all 32 groups'; }
  else if (source === 'weak') { label = 'Review Weak'; sub = 'Words marked New or Learning'; }
  else { label = GROUPS[source].name; sub = `${GROUPS[source].words.length} words`; }

  const { known, total } = totalStats();
  document.getElementById('main-title').textContent = label;
  document.getElementById('main-sub').textContent = sub;
  document.getElementById('stat-known').textContent = known;
  document.getElementById('stat-total').textContent = total;

  const pairs = getStudyWords(source);

  if (pairs.length === 0) {
    document.getElementById('main-content').innerHTML = `<div class="done-screen">
      <div class="done-icon">✦</div>
      <div class="done-title" style="color:var(--accent)">All caught up!</div>
      <div class="done-sub">No words to review. Try studying a different group.</div>
      <button class="done-btn" onclick="showOverview()">Back to overview</button>
    </div>`;
    return;
  }

  document.getElementById('main-content').innerHTML = `
    <div class="mode-tabs">
      <button class="mode-tab ${currentMode==='table'?'active':''}" onclick="setMode('table','${source}')">Study Table</button>
      <button class="mode-tab ${currentMode==='flashcard'?'active':''}" onclick="setMode('flashcard','${source}')">Flashcard</button>
      <button class="mode-tab ${currentMode==='quiz'?'active':''}" onclick="setMode('quiz','${source}')">Quiz</button>
      <button class="mode-tab ${currentMode==='fillblank'?'active':''}" onclick="setMode('fillblank','${source}')">Fill Blank</button>
      <button class="mode-tab ${currentMode==='antonym'?'active':''}" onclick="setMode('antonym','${source}')">Antonyms</button>
      <button class="mode-tab ${currentMode==='confused'?'active':''}" onclick="setMode('confused','${source}')">Confused?</button>
      <button class="mode-tab ${currentMode==='list'?'active':''}" onclick="setMode('list','${source}')">Word List</button>
    </div>
    <div id="mode-area"></div>`;

  if (currentMode === 'table') renderStudyTable(pairs, source);
  else if (currentMode === 'flashcard') renderFlashcard(pairs, source);
  else if (currentMode === 'quiz') renderQuiz(pairs, source);
  else if (currentMode === 'fillblank') renderFillBlank(pairs, source);
  else if (currentMode === 'antonym') renderAntonymDrill(pairs, source);
  else if (currentMode === 'confused') renderConfusedWords();
  else renderList(pairs, source);
}

function setMode(mode, source) {
  currentMode = mode;
  showGroupStudy(source !== undefined ? source : (currentGroupIdx !== null ? currentGroupIdx : 'all'));
}

// FLASHCARD
let fcPairs = [], fcCurrent = 0;

function renderFlashcard(pairs, source) {
  fcPairs = [...pairs].sort(() => Math.random() - 0.5);
  fcCurrent = 0;
  renderFCCard(source);
}

function renderFCCard(source) {
  if (fcCurrent >= fcPairs.length) {
    const { known, total } = totalStats();
    document.getElementById('mode-area').innerHTML = `<div class="done-screen">
      <div class="done-icon">★</div>
      <div class="done-title" style="color:var(--accent)">Round complete!</div>
      <div class="done-sub">${known} of ${total} total words mastered</div>
      <button class="done-btn" onclick="renderFlashcard(fcPairs.map((_,i)=>fcPairs[i]), '${source}')">Study again</button>
      <button class="done-btn" style="background:transparent;border:1px solid var(--border2);color:var(--text)" onclick="showOverview()">Overview</button>
    </div>`;
    return;
  }

  const {gi, wi, w} = fcPairs[fcCurrent];
  const status = getStatus(gi, wi);
  const pct = Math.round((fcCurrent / fcPairs.length) * 100);

  const root = ROOTS[w.w] ? `<div class="fc-root">Root: <span>${ROOTS[w.w]}</span></div>` : '';
  const family = (FAMILIES[w.w] || []).length ? `<div class="fc-family">${(FAMILIES[w.w]).map(fw => `<span class="family-chip" onclick="event.stopPropagation()">${fw}</span>`).join('')}</div>` : '';
  const antonym = ANTONYMS[w.w] ? `<div class="fc-antonym">↔ Antonym: <span>${ANTONYMS[w.w]}</span></div>` : '';

  document.getElementById('mode-area').innerHTML = `
    <div class="fc-wrap">
      <div class="fc-meta">
        <span class="fc-counter">${fcCurrent+1} / ${fcPairs.length}</span>
        <div class="fc-progress-bar"><div class="fc-progress-fill" style="width:${pct}%"></div></div>
        <span class="fc-counter" style="color:var(--accent)">G${gi+1}</span>
      </div>
      <div class="flashcard fc-status-${status}" id="fc-card">
        <div class="fc-hint">tap to reveal</div>
        <div style="display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap">
          <div class="fc-word">${w.w}</div>
        </div>
        <button class="speak-btn" onclick="event.stopPropagation();speakWord('${w.w.replace(/'/g,"\\'")}')">&#9654;</button>
        <div class="fc-pos">${w.pos}</div>
        <div class="definition-box" id="fc-reveal" style="display:none; text-align:center; width:100%">
          <div class="fc-divider"></div>
          <div class="fc-def">${w.d}</div>
          <div class="fc-ex">"${w.e}"</div>
          ${root}
          ${antonym}
          ${family}
        </div>
      </div>
      <div class="fc-actions" id="fc-rate-row">
        <button class="fc-btn fc-btn-hard" onclick="rateFC('new','${source}')">New to me</button>
        <button class="fc-btn fc-btn-ok" onclick="rateFC('learning','${source}')">Familiar</button>
        <button class="fc-btn fc-btn-easy" onclick="rateFC('known','${source}')">Got it</button>
      </div>
      <div class="fc-controls">
        <button class="ctrl-btn" onclick="fcSkip('${source}')">Skip →</button>
      </div>
      <div class="kbd-hints" style="display:flex;justify-content:center;gap:16px;margin-top:18px;opacity:0.5;flex-wrap:wrap">
        <span class="kbd-hint"><kbd>Space</kbd> flip</span>
        <span class="kbd-hint"><kbd>←</kbd> prev</span>
        <span class="kbd-hint"><kbd>→</kbd> next</span>
        <span class="kbd-hint"><kbd>Z</kbd> new to me</span>
        <span class="kbd-hint"><kbd>X</kbd> familiar</span>
        <span class="kbd-hint"><kbd>C</kbd> got it</span>
        <span class="kbd-hint"><kbd>V</kbd> pronounce</span>
        <span class="kbd-hint"><kbd>R</kbd> restart</span>

function rateFC(status, source) {
  const {gi, wi} = fcPairs[fcCurrent];
  setStatus(gi, wi, status);
  const card = document.getElementById('fc-card');
  if (card) {
    const colorMap = { new: 'fc-flash-hard', learning: 'fc-flash-ok', known: 'fc-flash-easy' };
    card.classList.add(colorMap[status]);
    setTimeout(() => {
      fcCurrent++;
      updateHeaderStats();
      buildSidebar();
      renderFCCard(source);
    }, 350);
  } else {
    fcCurrent++;
    updateHeaderStats();
    buildSidebar();
    renderFCCard(source);
  }
}

function fcSkip(source) {
  fcCurrent++;
  renderFCCard(source);
}

function fcPrev(source) {
  if (fcCurrent > 0) {
    fcCurrent--;
    renderFCCard(source);
  }
}

function updateHeaderStats() {
  const { known, total } = totalStats();
  document.getElementById('stat-known').textContent = known;
  document.getElementById('stat-total').textContent = total;
}

// QUIZ
let quizPairs = [], quizCurrent = 0, quizSource = null;

function renderQuiz(pairs, source) {
  quizPairs = [...pairs].sort(() => Math.random() - 0.5);
  quizCurrent = 0;
  quizSource = source;
  qCorrect = 0; qWrong = 0; qStreak = 0;
  renderQuizQ();
}

function renderQuizQ() {
  if (quizCurrent >= quizPairs.length) {
    document.getElementById('mode-area').innerHTML = `<div class="done-screen">
      <div class="done-icon">✦</div>
      <div class="done-title" style="color:var(--accent)">Quiz done!</div>
      <div class="done-sub">Score: ${qCorrect}/${quizPairs.length} correct</div>
      <button class="done-btn" onclick="renderQuiz(quizPairs, quizSource)">Try again</button>
      <button class="done-btn" style="background:transparent;border:1px solid var(--border2);color:var(--text)" onclick="showOverview()">Overview</button>
    </div>`;
    return;
  }

  const allPairs = [];
  GROUPS.forEach((g, gi) => g.words.forEach((w, wi) => allPairs.push({gi, wi, w})));

  const correct = quizPairs[quizCurrent];
  let opts = [correct];
  while (opts.length < 4) {
    const c = allPairs[Math.floor(Math.random() * allPairs.length)];
    if (!opts.find(o => o.w.w === c.w.w)) opts.push(c);
  }
  opts.sort(() => Math.random() - 0.5);

  document.getElementById('mode-area').innerHTML = `
    <div class="quiz-wrap">
      <div class="quiz-card">
        <div class="quiz-label">Which word matches this definition? (${quizCurrent+1}/${quizPairs.length})</div>
        <div class="quiz-def">${correct.w.d}</div>
        <div class="quiz-options" id="quiz-opts">
          ${opts.map(o => `<button class="quiz-opt" onclick="answerQuiz('${o.w.w}', '${correct.w.w}')">${o.w.w}</button>`).join('')}
        </div>
        <button class="next-btn" id="quiz-next" style="display:none" onclick="quizNext()">Next →</button>
      </div>
      <div class="quiz-stats">
        <div class="qstat"><div class="qstat-num" style="color:var(--green)">${qCorrect}</div><div class="qstat-label">Correct</div></div>
        <div class="qstat"><div class="qstat-num" style="color:var(--red)">${qWrong}</div><div class="qstat-label">Wrong</div></div>
        <div class="qstat"><div class="qstat-num" style="color:var(--accent)">${qStreak}</div><div class="qstat-label">Streak</div></div>
      </div>
    </div>`;
}

function answerQuiz(chosen, correct) {
  const btns = document.querySelectorAll('.quiz-opt');
  btns.forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
    else if (b.textContent === chosen) b.classList.add('wrong');
  });
  if (chosen === correct) {
    qCorrect++; qStreak++;
    const {gi, wi} = quizPairs[quizCurrent];
    setStatus(gi, wi, 'known');
  } else {
    qWrong++; qStreak = 0;
  }
  document.getElementById('quiz-next').style.display = '';
  updateHeaderStats(); buildSidebar();
}

function quizNext() { quizCurrent++; renderQuizQ(); }

// LIST
function renderList(pairs, source) {
  document.getElementById('mode-area').innerHTML = `
    <div class="wordlist-wrap">
      <input class="wl-search" id="wl-search" placeholder="Search words or definitions…" oninput="filterList()" />
      <div id="wl-list">${buildListHTML(pairs)}</div>
    </div>`;
}

function buildListHTML(pairs, filter='') {
  const fl = filter.toLowerCase();
  const filtered = fl ? pairs.filter(({w}) => w.w.toLowerCase().includes(fl) || w.d.toLowerCase().includes(fl)) : pairs;
  if (!filtered.length) return '<div style="padding:20px;color:var(--muted);font-size:14px;">No results</div>';
  return filtered.map(({gi, wi, w}) => {
    const s = getStatus(gi, wi);
    return `<div class="wl-item">
      <div>
        <div><span class="wl-word">${w.w}</span> <span class="wl-pos">${w.pos}</span></div>
        <div class="wl-def">${w.d}</div>
      </div>
      <div>
        <div class="wl-badge badge-${s}">${s}</div>
      </div>
    </div>`;
  }).join('');
}

let listPairsRef = [];
function renderListWithRef(pairs, source) {
  listPairsRef = pairs;
  renderList(pairs, source);
}

function filterList() {
  const val = document.getElementById('wl-search').value;
  document.getElementById('wl-list').innerHTML = buildListHTML(listPairsRef, val);
}

// Override renderList to store ref
const origRenderList = renderList;
window.renderList = function(pairs, source) {

  origRenderList(pairs, source);
};

// FLIP HELPER
function flipCard() {
  const reveal = document.getElementById('fc-reveal');
  const hint = document.querySelector('.fc-hint');
  if (!reveal || reveal.style.display !== 'none') return;
  reveal.style.display = '';
  if (hint) hint.style.display = 'none';
}

function toggleCard() {
  const reveal = document.getElementById('fc-reveal');
  const hint = document.querySelector('.fc-hint');
  if (!reveal) return;
  if (reveal.style.display === 'none') {
    reveal.style.display = '';
    if (hint) hint.style.display = 'none';
  } else {
    reveal.style.display = 'none';
    if (hint) hint.style.display = '';
  }
}

// MNEMONIC FETCH (AI-powered)
async function fetchMnemonic(word, def) {
  const el = document.getElementById('fc-mnemonic');
  if (!el) return;
  el.innerHTML = '<span style="color:var(--muted);font-size:13px">Thinking...</span>';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 120,
        messages: [{
          role: 'user',
          content: `Give a single short, vivid memory trick (mnemonic) to remember the GRE word "${word}" (meaning: ${def}). Max 2 sentences. Be clever, use wordplay, etymology, or imagery. No preamble.`
        }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || 'Could not generate mnemonic.';
    el.innerHTML = `<div class="mnemonic-text">💡 ${text}</div>`;
  } catch(e) {
    el.innerHTML = `<div style="color:var(--muted);font-size:12px">Could not load mnemonic.</div>`;
  }
}

// STUDY TABLE
let stHighlights=new Set(),stHideMeaning=false,stHideExample=false;
function renderStudyTable(pairs,source){
  try{stHighlights=new Set(JSON.parse(localStorage.getItem('gre_st_hl')||'[]'));}catch(e){}
  function saveHL(){try{localStorage.setItem('gre_st_hl',JSON.stringify([...stHighlights]));}catch(e){}}
  function draw(){
    const hlCount=pairs.filter(({gi,wi})=>stHighlights.has(gi+'_'+wi)).length;
    document.getElementById('mode-area').innerHTML=`
      <div class="study-table-wrap">
        <div class="st-controls">
          <button class="st-btn${stHideMeaning?' on':''}" onclick="stToggle('meaning')">${stHideMeaning?'👁 Show':'🙈 Hide'} Meaning</button>
          <button class="st-btn${stHideExample?' on':''}" onclick="stToggle('example')">${stHideExample?'👁 Show':'🙈 Hide'} Examples</button>
          <span class="st-info">${hlCount>0?`⭐ ${hlCount} highlighted`:'★ Click star to highlight'}</span>
        </div>
        <table class="study-table">
          <thead><tr><th style="width:30px">★</th><th style="width:24px"></th><th style="width:170px">Word</th><th style="width:65px">Type</th><th>Meaning</th><th>Example</th></tr></thead>
          <tbody>${pairs.map(({gi,wi,w})=>{
            const key=gi+'_'+wi,hl=stHighlights.has(key),status=getStatus(gi,wi);
            const mc=stHideMeaning?'st-blur':'',ec=stHideExample?'st-blur':'';
            return `<tr class="${hl?'st-hl':''}">
              <td><button class="st-star${hl?' on':''}" onclick="stHL('${key}')">★</button></td>
              <td><span class="st-dot st-dot-${status}"></span></td>
              <td><div class="st-word" onclick="speakWord('${w.w.replace(/'/g,"\\'")}')"><span>${w.w}</span><button class="st-speak-btn" onclick="event.stopPropagation();speakWord('${w.w.replace(/'/g,"\\'")}')">&#9654;</button></div></td>
              <td><span class="st-pos">${w.pos}</span></td>
              <td class="${mc}" onclick="this.classList.toggle('st-blur')">${w.d}</td>
              <td class="st-example ${ec}" onclick="this.classList.toggle('st-blur')">"${w.e}"</td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>`;
  }
  window.stToggle=(col)=>{if(col==='meaning')stHideMeaning=!stHideMeaning;else stHideExample=!stHideExample;draw();};
  window.stHL=(key)=>{if(stHighlights.has(key))stHighlights.delete(key);else stHighlights.add(key);saveHL();draw();};
  draw();
}

// PRONUNCIATION
function speakWord(word) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = 'en-US';
  utt.rate = 0.85;
  window.speechSynthesis.speak(utt);
}

let _fcSource = null;
const _origRenderFlashcard = renderFlashcard;
window.renderFlashcard = function(pairs, source) {
  _fcSource = source;
  _origRenderFlashcard(pairs, source);
};

document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT') return;

  if (currentMode === 'flashcard') {
    const revealEl = document.getElementById('fc-reveal');
    const revealed = revealEl && revealEl.style.display !== 'none';

    if (e.code === 'Space') {
      e.preventDefault();
      toggleCard();
    } else if (e.key === 'ArrowRight') {
      e.preventDefault();
      fcSkip(_fcSource);
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      fcPrev(_fcSource);
    } else if (e.key === 'z' || e.key === 'Z') {
      e.preventDefault();
      rateFC('new', _fcSource);
    } else if (e.key === 'x' || e.key === 'X') {
      e.preventDefault();
      rateFC('learning', _fcSource);
    } else if (e.key === 'c' || e.key === 'C') {
      e.preventDefault();
      rateFC('known', _fcSource);
    } else if (e.key === 'v' || e.key === 'V') {
      e.preventDefault();
      if (fcPairs[fcCurrent]) speakWord(fcPairs[fcCurrent].w.w);
    } else if (e.key === 'r' || e.key === 'R') {
      e.preventDefault();
      if (_fcSource !== null) {
        const pairs = getStudyWords(_fcSource);
        pairs.forEach(({gi, wi}) => setStatus(gi, wi, 'new'));
        updateHeaderStats();
        buildSidebar();
        renderFlashcard(getStudyWords(_fcSource), _fcSource);
      }
    }
  }
});

  { at: 900, emoji: '🎓', title: 'GRE Ready',   msg: 'All 900 words mastered!' }
];
let shownMilestones = new Set();

function checkMilestone(known) {
  MILESTONES.forEach(m => {
    if (known >= m.at && !shownMilestones.has(m.at)) {
      shownMilestones.add(m.at);
      showMilestone(m);
    }
  });
}

function showMilestone(m) {
  const el = document.createElement('div');
  el.className = 'milestone-toast';
  el.innerHTML = `<div class="ms-emoji">${m.emoji}</div><div><div class="ms-title">${m.title}</div><div class="ms-msg">${m.msg}</div></div>`;
  document.body.appendChild(el);
  confetti();
  setTimeout(() => el.classList.add('ms-show'), 50);
  setTimeout(() => { el.classList.remove('ms-show'); setTimeout(() => el.remove(), 400); }, 3500);
}

// CONFETTI
function confetti() {
  const colors = ['#e8c47a','#7ac47a','#c47a7a','#7aaac4','#c47ac4'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*0.8}s;animation-duration:${0.8+Math.random()*0.8}s;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;border-radius:${Math.random()>0.5?'50%':'2px'}`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}

// FILL IN BLANK MODE
function renderFillBlank(pairs, source) {
  if (!pairs.length) return;
  let fibIdx = 0;
  let fibPairs = [...pairs].sort(() => Math.random() - 0.5);
  let fibScore = { correct: 0, wrong: 0 };

  function renderFIB() {
    if (fibIdx >= fibPairs.length) {
      document.getElementById('mode-area').innerHTML = `<div class="done-screen">
        <div class="done-icon">✦</div>
        <div class="done-title" style="color:var(--accent)">Done!</div>
        <div class="done-sub">${fibScore.correct} correct / ${fibScore.wrong} wrong</div>
        <button class="done-btn" onclick="renderFillBlank(fibPairs,'${source}')">Try again</button>
        <button class="done-btn" style="background:transparent;border:1px solid var(--border2);color:var(--text)" onclick="showOverview()">Overview</button>
      </div>`;
      return;
    }
    const {gi, wi, w} = fibPairs[fibIdx];
    const blanked = w.e.replace(new RegExp(w.w, 'gi'), '_____');
    document.getElementById('mode-area').innerHTML = `
      <div class="fc-wrap" style="max-width:580px">
        <div class="fc-meta">
          <span class="fc-counter">${fibIdx+1} / ${fibPairs.length}</span>
          <div class="fc-progress-bar"><div class="fc-progress-fill" style="width:${Math.round(fibIdx/fibPairs.length*100)}%"></div></div>
          <span class="fc-counter" style="color:var(--accent)">Fill Blank</span>
        </div>
        <div class="fib-card">
          <div class="fib-label">Fill in the blank</div>
          <div class="fib-sentence">${blanked}</div>
          <div class="fib-hint">${w.d}</div>
        </div>
        <div class="fib-options" id="fib-opts"></div>
        <button class="next-btn" id="fib-next" style="display:none" onclick="fibNext()">Next →</button>
        <div class="quiz-stats" style="margin-top:16px">
          <div class="qstat"><div class="qstat-num" style="color:var(--green)">${fibScore.correct}</div><div class="qstat-label">Correct</div></div>
          <div class="qstat"><div class="qstat-num" style="color:var(--red)">${fibScore.wrong}</div><div class="qstat-label">Wrong</div></div>
        </div>
      </div>`;

    // Build 4 options
    const allPairs = [];
    GROUPS.forEach((g, gi) => g.words.forEach((ww, wi) => allPairs.push(ww.w)));
    let opts = [w.w];
    while (opts.length < 4) {
      const c = allPairs[Math.floor(Math.random() * allPairs.length)];
      if (!opts.includes(c)) opts.push(c);
    }
    opts.sort(() => Math.random() - 0.5);
    const container = document.getElementById('fib-opts');
    opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'quiz-opt';
      btn.textContent = opt;
      btn.onclick = () => {
        container.querySelectorAll('.quiz-opt').forEach(b => b.disabled = true);
        if (opt === w.w) { btn.classList.add('correct'); fibScore.correct++; setStatus(gi, wi, 'known'); }
        else { btn.classList.add('wrong'); fibScore.wrong++; container.querySelectorAll('.quiz-opt').forEach(b => { if (b.textContent === w.w) b.classList.add('correct'); }); }
        document.getElementById('fib-next').style.display = '';
        updateHeaderStats(); buildSidebar();
      };
      container.appendChild(btn);
    });

    window.fibNext = () => { fibIdx++; renderFIB(); };
  }
  renderFIB();
}

// ANTONYM DRILL MODE
function renderAntonymDrill(pairs, source) {
  const antPairs = pairs.filter(({w}) => ANTONYMS[w.w]);
  if (antPairs.length < 4) {
    document.getElementById('mode-area').innerHTML = `<div class="done-screen"><div class="done-icon">✦</div><div class="done-title">Not enough antonym data</div><div class="done-sub">Study more words first.</div></div>`;
    return;
  }
  let antIdx = 0;
  let antScore = { correct: 0, wrong: 0 };
  const shuffled = [...antPairs].sort(() => Math.random() - 0.5);

  function renderAnt() {
    if (antIdx >= shuffled.length) {
      document.getElementById('mode-area').innerHTML = `<div class="done-screen">
        <div class="done-icon">↔</div>
        <div class="done-title" style="color:var(--accent)">Antonym drill done!</div>
        <div class="done-sub">${antScore.correct} correct / ${antScore.wrong} wrong</div>
        <button class="done-btn" onclick="renderAntonymDrill(pairs,'${source}')">Try again</button>
        <button class="done-btn" style="background:transparent;border:1px solid var(--border2);color:var(--text)" onclick="showOverview()">Overview</button>
      </div>`;
      return;
    }
    const {w} = shuffled[antIdx];
    const correct = ANTONYMS[w.w];
    // Build options from all antonyms
    const allAntonyms = Object.values(ANTONYMS);
    let opts = [correct];
    while (opts.length < 4) {
      const c = allAntonyms[Math.floor(Math.random() * allAntonyms.length)];
      if (!opts.includes(c)) opts.push(c);
    }
    opts.sort(() => Math.random() - 0.5);

    document.getElementById('mode-area').innerHTML = `
      <div class="quiz-wrap">
        <div class="quiz-card">
          <div class="quiz-label">What is the antonym of...</div>
          <div class="quiz-def" style="font-size:32px">${w.w}</div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:20px;font-style:italic">${w.d}</div>
          <div class="quiz-options" id="ant-opts">
            ${opts.map(o => `<button class="quiz-opt" onclick="answerAnt('${o}','${correct}')">${o}</button>`).join('')}
          </div>
          <button class="next-btn" id="ant-next" style="display:none" onclick="antNext()">Next →</button>
        </div>
        <div class="quiz-stats">
          <div class="qstat"><div class="qstat-num" style="color:var(--green)">${antScore.correct}</div><div class="qstat-label">Correct</div></div>
          <div class="qstat"><div class="qstat-num" style="color:var(--red)">${antScore.wrong}</div><div class="qstat-label">Wrong</div></div>
          <div class="qstat"><div class="qstat-num" style="color:var(--accent)">${shuffled.length - antIdx}</div><div class="qstat-label">Left</div></div>
        </div>
      </div>`;

    window.answerAnt = (chosen, correct) => {
      document.querySelectorAll('#ant-opts .quiz-opt').forEach(b => {
        b.disabled = true;
        if (b.textContent === correct) b.classList.add('correct');
        else if (b.textContent === chosen) b.classList.add('wrong');
      });
      if (chosen === correct) antScore.correct++; else antScore.wrong++;
      document.getElementById('ant-next').style.display = '';
    };
    window.antNext = () => { antIdx++; renderAnt(); };
  }
  renderAnt();
}

let studyHistory = {};   // { 'YYYY-MM-DD': wordsRated }
let weakWords = {};      // { 'gi_wi': newToMeCount }

function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

function loadMeta() {
  try {
    const h = localStorage.getItem('gre_history');
    if (h) studyHistory = JSON.parse(h);
    const w = localStorage.getItem('gre_weak');
    if (w) weakWords = JSON.parse(w);
  } catch(e) {}
}

function saveMeta() {
  try {
    localStorage.setItem('gre_history', JSON.stringify(studyHistory));
    localStorage.setItem('gre_weak', JSON.stringify(weakWords));
  } catch(e) {}
}

function recordActivity(gi, wi, status) {
  const key = todayKey();
  studyHistory[key] = (studyHistory[key] || 0) + 1;
  if (status === 'new') {
    const wk = gi + '_' + wi;
    weakWords[wk] = (weakWords[wk] || 0) + 1;
  } else {
    // reduce weak count when improving
    const wk = gi + '_' + wi;
    if (weakWords[wk]) weakWords[wk] = Math.max(0, weakWords[wk] - 1);
  }
  saveMeta();
  updateStreak();
}

function calcStreak() {
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    if (studyHistory[key] && studyHistory[key] > 0) streak++;
    else if (i > 0) break;
  }
  return streak;
}

function updateStreak() {
  const s = calcStreak();
  const el = document.getElementById('streak-count');
  if (el) el.textContent = s;
}

// Patch rateFC to record activity and check milestones
const _origRateFC = rateFC;
window.rateFC = function(status, source) {
  if (fcPairs[fcCurrent]) {
    const {gi, wi} = fcPairs[fcCurrent];
    recordActivity(gi, wi, status);
  }
  _origRateFC(status, source);
  const { known } = totalStats();
  checkMilestone(known);
};

            ${weakList.map(({word, count}) => `
              <div class="weak-item">
                <span class="weak-word">${word}</span>
                <span class="weak-count">missed ${count}×</span>
              </div>`).join('')}
           </div>`}
    </div>`;
}

// STUDY PLAN
// Start date = today
// Always start from today (fresh slate)
const PLAN_START = (() => {
  const d = new Date(); d.setHours(0,0,0,0);
  try { localStorage.setItem('gre_plan_start', d.toISOString()); } catch(e) {}
  return d;
})();

// Exam date: July 31
const EXAM_DATE = new Date('2025-07-31');
const totalDays = Math.max(30, Math.ceil((EXAM_DATE - PLAN_START) / 86400000));

// Schedule:
// Days 1–16:  2 groups/day — all 32 groups covered
// Days 17–30: Heavy review, quiz sweeps, antonym & confused drills
// Days 31+:   Final polish until exam
function buildPlan() {
  const days = [];
  let groupIdx = 0;

  for (let d = 0; d < totalDays; d++) {
    const date = new Date(PLAN_START);
    date.setDate(date.getDate() + d);
    const dayNum = d + 1;
    let task, groups = [], chips, phase;

    if (dayNum <= 16) {
      // 2 groups/day — finishes all 32 groups by day 16
      const g1 = groupIdx < 32 ? groupIdx : null;
      const g2 = groupIdx + 1 < 32 ? groupIdx + 1 : null;
      groupIdx += 2;
      groups = [g1, g2].filter(g => g !== null);
      const names = groups.map(g => `Group ${g+1}`).join(' + ');
      task = `Learn ${names}`;
      chips = [
        { label: '35min Study Table', cls: 'fc' },
        { label: '30min Flashcard', cls: 'fc' },
        { label: '25min Quiz', cls: 'qz' }
      ];
      phase = 1;
    } else if (dayNum <= 25) {
      task = 'Review Weak Words';
      chips = [
        { label: '45min Review Weak', cls: 'rv' },
        { label: '30min Quiz all', cls: 'qz' },
        { label: '15min Antonym Drill', cls: 'qz' }
      ];
      phase = 2;
    } else if (dayNum <= 35) {
      task = 'Full Quiz Sweep + Confused Words';
      chips = [
        { label: '45min Full Quiz', cls: 'qz' },
        { label: '25min Confused Pairs', cls: 'fc' },
        { label: '20min Fill Blank', cls: 'rv' }
      ];
      phase = 3;
    } else if (dayNum <= 45) {
      task = 'Antonym + Weak Word Drill';
      chips = [
        { label: '45min Antonym Drill', cls: 'qz' },
        { label: '45min Review Weak', cls: 'rv' }
      ];
      phase = 3;
    } else {
      task = 'Final Review — All Groups';
      chips = [
        { label: '50min Quiz all groups', cls: 'qz' },
        { label: '40min Weak words', cls: 'rv' }
      ];
      phase = 4;
    }

    days.push({ dayNum, date, task, groups, chips, phase });
  }
  return days;
}

let planDays = buildPlan();
let completedDays = (() => {
  try { return new Set(JSON.parse(localStorage.getItem('gre_plan_done') || '[]')); } catch(e) { return new Set(); }
})();

function savePlanDone() {
  try { localStorage.setItem('gre_plan_done', JSON.stringify([...completedDays])); } catch(e) {}
}

function togglePlanDay(dayNum) {
  if (completedDays.has(dayNum)) completedDays.delete(dayNum);
  else completedDays.add(dayNum);
  savePlanDone();
  showPlan();
}

function showPlan() {
  const today = new Date(); today.setHours(0,0,0,0);
  const examDate = new Date('2025-07-31');
  const daysToExam = Math.max(0, Math.ceil((examDate - today) / 86400000));
  const daysLeft = Math.max(0, totalDays - Math.floor((today - PLAN_START) / 86400000));
  const donePct = Math.round((completedDays.size / totalDays) * 100);

  document.getElementById('main-title').textContent = 'Study Plan';
  document.getElementById('main-sub').textContent = `${totalDays} days · 1.5hrs/day · Exam: July 31, 2025`;

  const phaseColors = { 1:'var(--blue)', 2:'var(--amber)', 3:'var(--green)', 4:'var(--red)' };
  const phaseNames  = { 1:'Learn', 2:'Review', 3:'Drill', 4:'Final' };

  // Group into weeks
  const weeks = [];
  for (let i = 0; i < planDays.length; i += 7) weeks.push(planDays.slice(i, i+7));
  const weekLabels = [
    'Week 1 — Learn Groups 1–14',
    'Week 2 — Learn Groups 15–32',
    'Week 3 — Heavy Review',
    'Week 4 — Quiz & Drill',
    'Week 5 — Antonym & Confused',
    'Week 6 — Final Polish',
    'Week 7+ — Exam Prep'
  ];

  let html = `
    <div style="max-width:700px">
      <div class="plan-header-bar">
        <div class="plan-progress-summary">
          <div class="plan-stat"><div class="plan-stat-num">${completedDays.size}</div><div class="plan-stat-label">Days done</div></div>
          <div class="plan-stat"><div class="plan-stat-num" style="color:var(--red)">${daysToExam}</div><div class="plan-stat-label">Days to exam</div></div>
          <div class="plan-stat"><div class="plan-stat-num">${donePct}%</div><div class="plan-stat-label">Complete</div></div>
        </div>
        <button class="plan-day-btn" style="color:var(--red);border-color:rgba(196,122,122,0.4)" onclick="resetAllProgress()">🗑 Reset Progress</button>
      </div>
      <div class="plan-overall-bar"><div class="plan-overall-fill" style="width:${donePct}%"></div></div>`;

  weeks.forEach((week, wi) => {
    if (!week.length) return;
    html += `<div class="plan-week"><div class="plan-week-title">${weekLabels[wi] || 'Week '+(wi+1)}</div>`;
    week.forEach(d => {
      const isToday = d.date.getTime() === today.getTime();
      const isDone = completedDays.has(d.dayNum);
      const dateStr = d.date.toLocaleDateString('en', { weekday:'short', month:'short', day:'numeric' });
      const actionBtn = d.groups.length
        ? `<button class="plan-day-btn" onclick="selectGroup(${d.groups[0]})">Start →</button>`
        : d.phase === 2
          ? `<button class="plan-day-btn" onclick="showPage('review')">Review Weak →</button>`
          : d.phase === 3
            ? `<button class="plan-day-btn" onclick="setMode('quiz','all');showPage('all-flashcards')">Start Drill →</button>`
            : `<button class="plan-day-btn" onclick="showPage('review')">Final Review →</button>`;

      html += `
        <div class="plan-day${isToday?' today':''}${isDone?' completed':''}">
          <div class="plan-checkbox${isDone?' checked':''}" onclick="togglePlanDay(${d.dayNum})">${isDone?'✓':''}</div>
          <div class="plan-day-content">
            <div class="plan-day-header">
              <span class="plan-day-label">Day ${d.dayNum}</span>
              <span class="plan-day-date">${dateStr}</span>
              ${isToday ? '<span class="plan-today-badge">Today</span>' : ''}
              <span style="font-size:10px;padding:2px 7px;border-radius:10px;border:1px solid;color:${phaseColors[d.phase]};border-color:${phaseColors[d.phase]}">${phaseNames[d.phase]}</span>
            </div>
            <div class="plan-day-word">${d.task}</div>
            <div class="plan-time-chips">${d.chips.map(c=>`<span class="plan-chip ${c.cls}">${c.label}</span>`).join('')}</div>
          </div>
          ${!isDone ? actionBtn : '<span style="font-size:12px;color:var(--green);margin-top:4px">✓ Done</span>'}
        </div>`;
    });
    html += `</div>`;
  });

  html += `</div>`;
  document.getElementById('main-content').innerHTML = html;
}

function resetAllProgress() {
  if (!confirm('Reset ALL progress? This clears word statuses, streaks, history and plan checkboxes. Cannot be undone.')) return;
  // Clear wordData
  GROUPS.forEach((g, gi) => g.words.forEach((_, wi) => { wordData[gi+'_'+wi] = 'new'; }));
  // Clear all localStorage keys
  ['gre_vocab_progress','gre_history','gre_weak','gre_plan_done','gre_st_hl'].forEach(k => {
    try { localStorage.removeItem(k); } catch(e) {}
  });
  studyHistory = {};
  weakWords = {};
  completedDays = new Set();
  shownMilestones = new Set();
  updateHeaderStats();
  updateStreak();
  buildSidebar();
  showPlan();
}

// INIT
initData();
loadMeta();
buildSidebar();
updateStreak();
showOverview();
</script>
